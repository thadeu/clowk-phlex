# Release pipeline — fires on a `vX.Y.Z` tag. Builds the (gitignored) dist,
# runs both test suites, publishes the gem + npm package, and attaches the
# packaged artifacts to the GitHub release.
#
# Publishing:
#   gem → RubyGems via Trusted Publishing (OIDC) — no secret; configure a
#         Trusted Publisher for the gem on rubygems.org (pending publisher for a
#         first release). Sidesteps API-key MFA/OTP prompts entirely.
#   npm → uses NPM_TOKEN — must be an *automation* token (bypasses npm 2FA in CI).
#
# Pushing a vX.Y.Z tag runs it.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub release
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    # Fail fast instead of hanging (e.g. a publish step waiting on an interactive
    # MFA/OTP prompt).
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.2"
          bundler-cache: true
          working-directory: gem

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
          cache-dependency-path: npm/pnpm-lock.yaml

      # Write the tag version into /VERSION and propagate it into the gem's
      # version.rb + npm's package.json (needs node for `npm pkg set`).
      - name: Sync version from tag
        run: |
          echo "${GITHUB_REF_NAME#v}" > VERSION
          bash scripts/sync-version.sh

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build npm (JS bundle + precompiled CSS)
        working-directory: npm
        run: |
          pnpm install --frozen-lockfile
          pnpm build   # bundles src/** and scans ../gem/lib/**/*.rb → dist/clowk-phlex.css

      # ── Lint + Test ───────────────────────────────────────────────────────
      - name: Lint gem (standardrb)
        working-directory: gem
        run: bundle exec standardrb

      - name: Test gem
        working-directory: gem
        run: bundle exec rspec

      - name: Smoke npm build
        working-directory: npm
        run: pnpm smoke

      - name: Test npm (vitest)
        working-directory: npm
        run: pnpm test

      # ── Publish ───────────────────────────────────────────────────────────
      # RubyGems Trusted Publishing (OIDC) — no API key, no MFA/OTP prompt.
      # Requires a Trusted Publisher configured for this gem on rubygems.org
      # (owner=clowk, repo=clowk-phlex, workflow=release.yml). For a brand-new
      # gem, add a *pending* trusted publisher first; the first push creates it.
      - name: Configure RubyGems credentials (OIDC)
        uses: rubygems/configure-rubygems-credentials@main

      - name: Publish gem → RubyGems
        working-directory: gem
        run: |
          gem build clowk-phlex.gemspec
          gem push clowk-phlex-*.gem

      - name: Publish package → npm
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      # ── GitHub release with packaged artifacts ────────────────────────────
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            gem/clowk-phlex-*.gem
            npm/dist/**
